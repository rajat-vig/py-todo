*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#0f172a;color:white;padding:20px;}

.phase-header h2{color:#facc15;font-size:24px;}
.phase-content{padding:20px;display:none;}
.phase.active .phase-content{display:block;}
.phase-description{color:#cbd5e1;margin-bottom:20px;line-height:1.6;}
.section-title{margin-top:25px;margin-bottom:15px;color:#facc15;font-size:22px;}
.group-title{margin-top:15px;margin-bottom:10px;color:#38bdf8;font-size:18px;}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid rgba(255,255,255,0.08);}
.todo-item label{flex:1;line-height:1.5;cursor:pointer;}
.completed{text-decoration:line-through;color:#94a3b8;}
.note-btn{background:#38bdf8;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;}
.note-btn:hover{background:#0ea5e9;}
.arrow{font-size:18px;color:#cbd5e1;}
.profile-dropdown{position:relative;display:inline-block;}
.dropdown-list{position:absolute;top:45px;left:0;background:#1e293b;border:1px solid #334155;border-radius:8px;width:220px;display:none;z-index:999;overflow:hidden;}
.dropdown-list.show{display:block;}
.dropdown-item{display:flex;justify-content:space-between;align-items:center;padding:10px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.08);}
.dropdown-item:hover{background:#0f172a;}
.delete-profile{background:red;border:none;color:white;padding:3px 6px;border-radius:4px;cursor:pointer;font-size:12px;}
.active-profile-name{font-weight:bold;color:#facc15;margin-left:4px;}
.note-wrapper{display:none;margin:4px 0 14px 0;border-radius:10px;overflow:hidden;border:1px solid #334155;}
.note-wrapper.show-note{display:block;}
.note-toolbar{display:flex;background:#0f172a;border-bottom:1px solid #334155;}
.note-tab{flex:1;padding:7px 0;text-align:center;font-size:13px;cursor:pointer;color:#94a3b8;border:none;background:transparent;transition:background 0.15s,color 0.15s;}
.note-tab.active{background:#1e293b;color:#38bdf8;font-weight:bold;}
.note-tab:hover:not(.active){background:#1a2540;color:#cbd5e1;}
.note-area{width:100%;min-height:100px;resize:vertical;border:none;padding:12px;background:#1e293b;color:white;font-size:14px;line-height:1.6;display:none;outline:none;}
.note-area.tab-visible{display:block;}
.note-preview{display:none;padding:14px 16px;background:#1e293b;color:#cbd5e1;font-size:14px;line-height:1.8;min-height:80px;}
.note-preview.tab-visible{display:block;}
.note-preview h2{color:#facc15;font-size:17px;margin:10px 0 6px;}
.note-preview h3{color:#38bdf8;font-size:15px;margin:8px 0 4px;}
.note-preview h4{color:#94a3b8;font-size:14px;margin:6px 0 4px;}
.note-preview strong{color:#f1f5f9;}
.note-preview em{color:#a5b4fc;font-style:italic;}
.note-preview code{background:#0f172a;color:#34d399;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px;}
.note-preview ul{padding-left:18px;margin:6px 0;}
.note-preview li{margin:2px 0;}
.note-preview .empty{color:#475569;font-style:italic;}
@media(max-width:768px){.todo-item{flex-wrap:wrap;}.note-btn{width:100%;}}

/* ═══════════════════════════════════
   PROFILE SYSTEM
═══════════════════════════════════ */
let profiles = {};
try { profiles = JSON.parse(localStorage.getItem("faangProfiles")) || {}; } catch(e) { profiles = {}; }
let activeProfile = localStorage.getItem("activeProfile") || "default";
if(!profiles[activeProfile]) profiles[activeProfile] = { name:"My Progress", data:{} };
let savedData = profiles[activeProfile].data;

function switchProfile(id){
  if(!profiles[id]) return;
  activeProfile = id;
  localStorage.setItem("activeProfile", id);
  savedData = profiles[activeProfile].data;
  const lbl = document.getElementById("activeProfileLabel");
  if(lbl) lbl.innerText = profiles[id].name;
  document.querySelectorAll(".todo-item").forEach(item => {
    const checkbox = item.querySelector("input[type='checkbox']");
    if(!checkbox) return;
    const label   = item.querySelector("label");
    const wrapper = item.nextElementSibling;
    const noteArea = wrapper && wrapper.querySelector("textarea");
    const state = savedData[checkbox.id] || {};
    checkbox.checked = !!state.checked;
    label.classList.toggle("completed", !!state.checked);
    if(noteArea) noteArea.value = state.note || "";
    if(wrapper && wrapper.classList.contains("note-wrapper")){
      wrapper.classList.remove("show-note");
      const editTab    = wrapper.querySelector(".note-tab:first-child");
      const previewTab = wrapper.querySelector(".note-tab:last-child");
      const preview    = wrapper.querySelector(".note-preview");
      if(editTab)    editTab.classList.add("active");
      if(previewTab) previewTab.classList.remove("active");
      if(noteArea)   noteArea.classList.add("tab-visible");
      if(preview)    preview.classList.remove("tab-visible");
    }
  });
  updateProgress();
}

function renderProfiles(){
  const list = document.getElementById("dropdownList");
  list.innerHTML = "";
  Object.entries(profiles).forEach(([id, profile]) => {
    const row = document.createElement("div");
    row.className = "dropdown-item";
    row.addEventListener("click", () => {
      switchProfile(id);
      document.getElementById("dropdownList").classList.remove("show");
    });
    const nameSpan = document.createElement("span");
    nameSpan.innerText = profile.name;
    nameSpan.style.flex = "1";
    row.appendChild(nameSpan);
    if(id !== "default"){
      const delBtn = document.createElement("button");
      delBtn.innerText = "🗑";
      delBtn.className = "delete-profile";
      delBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        if(confirm("Delete this profile?")){
          delete profiles[id];
          localStorage.setItem("faangProfiles", JSON.stringify(profiles));
          if(activeProfile === id){ renderProfiles(); switchProfile("default"); }
          else renderProfiles();
          document.getElementById("dropdownList").classList.remove("show");
        }
      });
      row.appendChild(delBtn);
    }
    list.appendChild(row);
  });
  initProfileDropdown();
}
renderProfiles();

document.getElementById("newProfileBtn").addEventListener("click", () => {
  const name = prompt("Profile name?");
  if(!name) return;
  const id = "profile-" + Date.now();

  renderProfiles();
  switchProfile(id);

/* ═══════════════════════════════════
   MARKDOWN RENDERER
═══════════════════════════════════ */
function renderMarkdown(text){
  if(!text || !text.trim()) return '<span class="empty">No notes yet — switch to Edit to write something.</span>';
  let html = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  html = html.replace(/^### (.+)$/gm,"<h4>$1</h4>");
  html = html.replace(/^## (.+)$/gm,"<h3>$1</h3>");
  html = html.replace(/^# (.+)$/gm,"<h2>$1</h2>");
  html = html.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g,"<em>$1</em>");
  html = html.replace(/`(.+?)`/g,"<code>$1</code>");
  const lines = html.split("\n");
  let out = [], inList = false;
  lines.forEach(line => {
    if(/^- (.+)/.test(line)){
      if(!inList){ out.push("<ul>"); inList=true; }
      out.push("<li>"+line.replace(/^- /,"")+"</li>");
    } else {
      if(inList){ out.push("</ul>"); inList=false; }
      out.push(line.match(/^<\/?h[234]>/) ? line : (line===""?"<br>":line+"<br>"));
    }
  });
  if(inList) out.push("</ul>");
  return out.join("");
}

  header.appendChild(arrow);
  header.addEventListener("click", () => {
    phaseDiv.classList.toggle("active");

  });

  const content = document.createElement("div");
  content.classList.add("phase-content");

  if(phase.description){
    const desc = document.createElement("p");
    desc.classList.add("phase-description");
    desc.innerText = phase.description;
    content.appendChild(desc);
  }

  phase.sections.forEach((section, sectionIndex) => {
    const secTitle = document.createElement("h3");
    secTitle.classList.add("section-title");
    secTitle.innerText = section.heading;
    content.appendChild(secTitle);

    section.groups.forEach((group, groupIndex) => {

      grpTitle.classList.add("group-title");

      content.appendChild(grpTitle);

        const taskId = `task-${phaseIndex}-${sectionIndex}-${groupIndex}-${taskIndex}`;

        item.classList.add("todo-item");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = taskId;

        label.innerText = task;
        label.htmlFor = taskId;

        noteBtn.classList.add("note-btn");
        noteBtn.innerText = "📝 Note";

        /* Note wrapper */
        const noteWrapper = document.createElement("div");
        noteWrapper.classList.add("note-wrapper");

        const toolbar = document.createElement("div");
        toolbar.classList.add("note-toolbar");

        const editTab = document.createElement("button");
        editTab.classList.add("note-tab","active");
        editTab.innerText = "✏️ Edit";
        editTab.type = "button";

        const previewTab = document.createElement("button");
        previewTab.classList.add("note-tab");
        previewTab.innerText = "👁 Preview";
        previewTab.type = "button";

        toolbar.appendChild(editTab);
        toolbar.appendChild(previewTab);

        const noteArea = document.createElement("textarea");
        noteArea.classList.add("note-area","tab-visible");
        noteArea.placeholder = "Write notes here...\n\nSupports markdown:\n# Heading\n**bold**  *italic*  `code`\n- bullet item";

        const notePreview = document.createElement("div");
        notePreview.classList.add("note-preview");

        noteWrapper.appendChild(toolbar);
        noteWrapper.appendChild(noteArea);
        noteWrapper.appendChild(notePreview);

        /* Restore saved state */
        if(savedData[taskId]?.checked){ checkbox.checked = true; label.classList.add("completed"); }
        if(savedData[taskId]?.note) noteArea.value = savedData[taskId].note;

        /* Events */
        checkbox.addEventListener("change", () => {
          label.classList.toggle("completed", checkbox.checked);
          saveData(); updateProgress();
        });
        noteBtn.addEventListener("click", () => noteWrapper.classList.toggle("show-note"));
        editTab.addEventListener("click", () => {
          editTab.classList.add("active"); previewTab.classList.remove("active");
          noteArea.classList.add("tab-visible"); notePreview.classList.remove("tab-visible");
        });
        previewTab.addEventListener("click", () => {
          previewTab.classList.add("active"); editTab.classList.remove("active");
          notePreview.classList.add("tab-visible"); noteArea.classList.remove("tab-visible");
          notePreview.innerHTML = renderMarkdown(noteArea.value);
        });
        noteArea.addEventListener("input", saveData);

        item.appendChild(checkbox);
        item.appendChild(label);
        item.appendChild(noteBtn);
        content.appendChild(item);
        content.appendChild(noteWrapper);
      });
    });
  });

  phaseDiv.appendChild(header);
  phaseDiv.appendChild(content);
  container.appendChild(phaseDiv);
});

/* ═══════════════════════════════════
   SAVE DATA
═══════════════════════════════════ */
function saveData(){
  const data = {};
  document.querySelectorAll(".todo-item").forEach(item => {
    const checkbox = item.querySelector("input");
    const noteArea = item.nextElementSibling.querySelector("textarea");
    data[checkbox.id] = { checked: checkbox.checked, note: noteArea.value };
  });
  profiles[activeProfile].data = data;
  localStorage.setItem("faangProfiles", JSON.stringify(profiles));
}

/* ═══════════════════════════════════
   PROGRESS
═══════════════════════════════════ */
function updateProgress(){
  const total     = document.querySelectorAll("input[type='checkbox']").length;
  const completed = document.querySelectorAll("input[type='checkbox']:checked").length;
  document.getElementById("overallProgress").style.width = ((completed/total)*100)+"%";
  document.getElementById("stats").innerText = `${completed} / ${total} Completed`;
}
updateProgress();

/* ═══════════════════════════════════
   SHARE PROFILE
═══════════════════════════════════ */
document.getElementById("shareBtn").addEventListener("click", () => {
  const profile = profiles[activeProfile];
  const json = JSON.stringify({ name: profile.name, data: profile.data }, null, 2);
  const a = document.createElement("a");
  a.href = "data:application/json;charset=utf-8," + encodeURIComponent(json);
  a.download = profile.name + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

/* ═══════════════════════════════════
   IMPORT PROFILE
═══════════════════════════════════ */
document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", (event) => {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const imported = JSON.parse(e.target.result);
      let baseName = imported.name || "Imported Profile";
      let finalName = baseName;
      const exists = Object.values(profiles).some(p => p.name === baseName);
      if(exists){
        const newName = prompt("Profile name already exists. Enter a new name:", baseName + " Copy");
        if(!newName) return;
        finalName = newName;
      }
      const profileId = "imported-" + Date.now();
      profiles[profileId] = { name: finalName, data: imported.data || {} };
      localStorage.setItem("faangProfiles", JSON.stringify(profiles));
      renderProfiles();
      alert("Profile imported successfully!");
    }catch(err){ alert("Invalid JSON file"); }
  };
  reader.readAsText(file);
});

/* ═══════════════════════════════════
   DROPDOWN INIT
═══════════════════════════════════ */
function initProfileDropdown(){
  const btn  = document.getElementById("dropdownBtn");
  const list = document.getElementById("dropdownList");
  if(!btn || !list) return;
  btn.onclick = null;
  document.onclick = null;
  btn.onclick = (e) => { e.stopPropagation(); list.classList.toggle("show"); };
  document.onclick = (e) => { if(!e.target.closest(".profile-dropdown")) list.classList.remove("show"); };
}
</script>
</body>
